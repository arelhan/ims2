services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=file:/data/db/prod.db
      - JWT_SECRET=${JWT_SECRET:-degistir-bunu-guclu-bir-secret-yap}
      - PORT=4000
      - NODE_ENV=production
      - ADMIN_PANEL_URL=${ADMIN_PANEL_URL:-http://localhost:3001}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:3002}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    volumes:
      - db_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        BACKEND_URL: http://backend:4000
    ports:
      - "3001:3001"
    environment:
      - BACKEND_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  public-app:
    build:
      context: ./public-app
      args:
        NEXT_PUBLIC_API_URL: /api
        BACKEND_URL: http://backend:4000
    ports:
      - "3002:3002"
    environment:
      - BACKEND_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
