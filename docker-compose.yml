services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=file:/data/db/prod.db
      - JWT_SECRET=${JWT_SECRET:-degistir-bunu-guclu-bir-secret-yap}
      - PORT=4000
      - NODE_ENV=production
      - ADMIN_PANEL_URL=${ADMIN_PANEL_URL:-http://localhost:3001}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:3002}
    volumes:
      - db_data:/data/db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    ports:
      - "3001:3001"
    environment:
      - BACKEND_URL=http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped

  public-app:
    build:
      context: ./public-app
      args:
        NEXT_PUBLIC_API_URL: /api
    ports:
      - "3002:3002"
    environment:
      - BACKEND_URL=http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
